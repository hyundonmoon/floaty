<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Mint gradient for main note body -->
    <linearGradient id="noteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d9a0"/>
      <stop offset="100%" stop-color="#2ebd8e"/>
    </linearGradient>
    <!-- Darker gradient for folded corner -->
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28a67c"/>
      <stop offset="100%" stop-color="#239069"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1a7a55" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Main sticky note body with rounded corners and shadow -->
  <path d="
    M 132,92
    H 812
    Q 892,92 892,172
    V 732
    L 732,892
    H 212
    Q 132,892 132,812
    V 172
    Q 132,92 132,92
    Z
  " fill="url(#noteGrad)" filter="url(#shadow)"/>

  <!-- Folded corner triangle -->
  <path d="
    M 732,892
    L 892,732
    H 812
    Q 732,732 732,812
    Z
  " fill="url(#foldGrad)"/>

  <!-- Text lines -->
  <!-- Line 1: longest, highest opacity -->
  <rect x="232" y="270" width="480" height="28" rx="14" fill="white" opacity="0.85"/>
  <!-- Line 2 -->
  <rect x="232" y="370" width="400" height="28" rx="14" fill="white" opacity="0.55"/>
  <!-- Line 3 -->
  <rect x="232" y="470" width="440" height="28" rx="14" fill="white" opacity="0.55"/>
  <!-- Line 4: shortest, lowest opacity -->
  <rect x="232" y="570" width="300" height="28" rx="14" fill="white" opacity="0.35"/>
</svg>
